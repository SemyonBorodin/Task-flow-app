spring:
  datasource:
    url: jdbc:postgresql://postgres-dev:5432/taskflow_dev
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: password

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true


server:
  port: 8080

  logging:
    level:
      ru.borodinsemyon: DEBUG
      org.hibernate.SQL: DEBUG

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml
    url: jdbc:postgresql://postgres-dev:5432/taskflow_dev